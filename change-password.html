<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>更改密碼</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .password-box {
      max-width: 380px;
      margin: 80px auto;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    .password-box h2 {
      color: #2c3e50;
      margin-bottom: 25px;
      font-size: 20px;
    }
    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 5px;
      color: #34495e;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    input:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.1);
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #2980b9;
    }
    .back-btn {
      background: #6c757d;
      margin-top: 10px;
    }
    #msg {
      margin-top: 15px;
      min-height: 20px;
      font-size: 14px;
    }
    .error {
      color: #e74c3c;
    }
    .success {
      color: #27ae60;
    }
    .loading {
      color: #3498db;
    }
  </style>
</head>
<body>
  <div class="password-box">
    <h2>更改密碼</h2>
    
    <div class="input-group">
      <label for="currentPassword">當前密碼</label>
      <input id="currentPassword" type="password" placeholder="請輸入當前密碼">
    </div>
    
    <div class="input-group">
      <label for="newPassword">新密碼</label>
      <input id="newPassword" type="password" placeholder="請輸入新密碼（至少6位）">
    </div>
    
    <div class="input-group">
      <label for="confirmPassword">確認新密碼</label>
      <input id="confirmPassword" type="password" placeholder="請再次輸入新密碼">
    </div>
    
    <button onclick="changePassword()">提交更改</button>
    <button class="back-btn" onclick="window.history.back()">返回上一頁</button>
    
    <div id="msg"></div>
  </div>

  <script>
    // 配置项（硬编码避免 localStorage 依赖）
    const SUPABASE_URL = "https://dqfpxfqfhduzrobupenq.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxZnB4ZnFmaGR1enJvYnVwZW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTU2MTAsImV4cCI6MjA4NzkzMTYxMH0.Crs6dYz0ddR7YgPCejEHNCCi0apniaeD_AThxFZ259c";
    const TARGET_USER_ID = "HCC"; // 直接指定用户ID，避免参数传递错误

    // 页面加载检查
    window.onload = function() {
      document.getElementById("currentPassword").focus();
    };

    // 消息提示
    function showMessage(text, type = "error") {
      const msg = document.getElementById("msg");
      msg.textContent = text;
      msg.className = type;
    }

    // 核心函数：纯原生 Fetch，无任何 SDK 依赖
    async function changePassword() {
      // 获取输入值
      const currentPassword = document.getElementById("currentPassword").value.trim();
      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      // 表单验证
      if (!currentPassword || !newPassword || !confirmPassword) {
        showMessage("請填寫所有必填欄位！");
        return;
      }
      if (newPassword.length < 6) {
        showMessage("新密碼長度不能少於6位！");
        return;
      }
      if (newPassword !== confirmPassword) {
        showMessage("新密碼與確認密碼不匹配！");
        return;
      }
      if (currentPassword === newPassword) {
        showMessage("新密碼不能與當前密碼相同！");
        return;
      }

      showMessage("正在驗證並修改密碼...", "loading");
      
      try {
        // ========== 1. 查询用户（纯原生 Fetch，无任何多余参数） ==========
        console.log("開始查詢用戶，ID：", TARGET_USER_ID);
        // 关键：URL 手动拼接，仅保留 userid=eq.HCC，无任何后缀
        const queryUrl = `${SUPABASE_URL}/rest/v1/users?userid=eq.${encodeURIComponent(TARGET_USER_ID)}`;
        const queryRes = await fetch(queryUrl, {
          method: "GET",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json"
          },
          timeout: 10000
        });

        // 检查查询响应
        if (!queryRes.ok) {
          throw new Error(`查詢失敗 [${queryRes.status}]：${queryRes.statusText}`);
        }
        const userData = await queryRes.json();
        if (userData.length === 0) {
          throw new Error("用戶不存在");
        }
        const user = userData[0];

        // 验证当前密码
        if (user.password !== currentPassword) {
          throw new Error("當前密碼錯誤");
        }

        // ========== 2. 更新密码（纯原生 Fetch） ==========
        const updateUrl = `${SUPABASE_URL}/rest/v1/users?userid=eq.${encodeURIComponent(TARGET_USER_ID)}`;
        const updateRes = await fetch(updateUrl, {
          method: "PATCH",
          headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({ password: newPassword }),
          timeout: 10000
        });

        if (!updateRes.ok) {
          throw new Error(`更新失敗 [${updateRes.status}]：${updateRes.statusText}`);
        }

        // ========== 3. 成功处理 ==========
        showMessage("密碼修改成功！將於3秒後返回首頁...", "success");
        document.querySelector("button").disabled = true;
        setTimeout(() => window.location.href = "index.html", 3000);

      } catch (err) {
        console.error("修改密碼錯誤：", err);
        showMessage(`修改失敗：${err.message || "未知錯誤"}`);
      }
    }
  </script>
</body>
</html>
